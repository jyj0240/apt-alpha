name: Collect Real Estate Data

on:
  schedule:
    # 매일 한국시간 06:00 (UTC 21:00 전날) 실행
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas python-dotenv

      - name: Run data collection
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          python collect_data.py

      - name: Check for changes
        id: changes
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new data"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New data found"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ data/cache_meta.json
          git commit -m "Auto-update: $(date -u +%Y-%m-%d) data collection

          Automated daily data collection via GitHub Actions.
          TTL-based: only stale data is refreshed."
          git push
